<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Logowanie — EKOMAT Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f3f4f6; display: flex; align-items: center; justify-content: center;
               min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; padding: 40px; width: 380px;
                box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .logo { text-align: center; margin-bottom: 8px; }
        .logo h1 { font-size: 22px; color: #1a1a2e; font-weight: 700; }
        .logo .sub { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        h2 { font-size: 16px; margin-bottom: 20px; color: #374151; font-weight: 500; text-align: center; }
        label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px;
                font-size: 14px; margin-bottom: 16px; outline: none; transition: border-color .2s; }
        input:focus { border-color: #1a1a2e; }
        button { width: 100%; padding: 11px; background: #1a1a2e; color: #fff; border: none;
                 border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
                 transition: background .2s; }
        button:hover { background: #2d2d5e; }
        .error { color: #dc2626; font-size: 13px; margin-bottom: 12px; text-align: center;
                 background: #fef2f2; padding: 8px 12px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>EKOMAT Dashboard</h1>
            <div class="sub">Panel analityczny</div>
        </div>
        <br/>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="jan@ekomat.pl" autofocus required>
            <label for="password">Hasło</label>
            <input type="password" name="password" id="password" placeholder="••••••••" required>
            <button type="submit">Zaloguj się</button>
        </form>
    </div>
</body>
</html>
