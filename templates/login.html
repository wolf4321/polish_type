<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Вхід</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f3f4f6; display: flex; align-items: center; justify-content: center;
               min-height: 100vh; }
        .card { background: #fff; border-radius: 12px; padding: 40px; width: 360px;
                box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        h1 { font-size: 22px; margin-bottom: 24px; color: #1a1a2e; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px;
                font-size: 14px; margin-bottom: 16px; }
        button { width: 100%; padding: 10px; background: #1a1a2e; color: #fff; border: none;
                 border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        button:hover { background: #2d2d5e; }
        .error { color: #dc2626; font-size: 13px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Вхід в панель</h1>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/login">
            <input type="password" name="password" placeholder="Пароль" autofocus>
            <button type="submit">Увійти</button>
        </form>
    </div>
</body>
</html>
