<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Zarządzanie użytkownikami — EKOMAT</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f3f4f6; color: #1f2937; }

        .navbar { background: #1a1a2e; color: #fff; padding: 12px 24px;
                  display: flex; align-items: center; justify-content: space-between; }
        .navbar h1 { font-size: 16px; font-weight: 600; }
        .navbar-links { display: flex; gap: 16px; align-items: center; }
        .navbar a { color: #a5b4fc; font-size: 13px; text-decoration: none; }
        .navbar a:hover { color: #fff; }
        .navbar a.active { color: #fff; font-weight: 600; border-bottom: 2px solid #a5b4fc; padding-bottom: 2px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-header h2 { font-size: 20px; color: #1a1a2e; }

        .btn { padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px;
               cursor: pointer; font-weight: 500; }
        .btn-add { background: #7c3aed; color: #fff; }
        .btn-add:hover { background: #6d28d9; }
        .btn-save { background: #059669; color: #fff; }
        .btn-save:hover { background: #047857; }
        .btn-cancel { background: #e5e7eb; color: #374151; }
        .btn-cancel:hover { background: #d1d5db; }
        .btn-delete { background: #dc2626; color: #fff; font-size: 12px; padding: 5px 12px; }
        .btn-delete:hover { background: #b91c1c; }
        .btn-edit { background: #2563eb; color: #fff; font-size: 12px; padding: 5px 12px; }
        .btn-edit:hover { background: #1d4ed8; }
        .btn-toggle { font-size: 12px; padding: 5px 12px; border: 1px solid #e5e7eb; background: #fff;
                      border-radius: 6px; cursor: pointer; }

        .card { background: #fff; border-radius: 10px; padding: 20px;
                box-shadow: 0 1px 3px rgba(0,0,0,.06); }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 12px; border-bottom: 2px solid #e5e7eb;
             color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
        td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        tr:hover td { background: #f9fafb; }

        .perm-tag { display: inline-block; padding: 2px 8px; border-radius: 10px;
                    font-size: 10px; font-weight: 500; background: #dbeafe; color: #1e40af;
                    margin: 1px 2px; }
        .status-active { color: #059669; }
        .status-inactive { color: #dc2626; }
        .actions { display: flex; gap: 6px; }
        .user-email { color: #6b7280; font-size: 12px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                         background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 28px; width: 480px;
                 max-height: 90vh; overflow-y: auto;
                 box-shadow: 0 8px 30px rgba(0,0,0,.15); }
        .modal h3 { font-size: 18px; margin-bottom: 20px; color: #1a1a2e; }
        .modal label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }
        .modal input[type="text"], .modal input[type="email"] {
            width: 100%; padding: 9px 12px; border: 1px solid #e5e7eb;
            border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

        .perms-section { margin-bottom: 16px; }
        .perms-section .section-title { font-size: 12px; font-weight: 600; color: #374151;
                                         margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }
        .perm-row { display: flex; align-items: center; gap: 8px; padding: 6px 0;
                    border-bottom: 1px solid #f9fafb; }
        .perm-row label { margin: 0; font-size: 13px; color: #1f2937; font-weight: 500; cursor: pointer; flex: 1; }
        .perm-row .perm-desc { font-size: 11px; color: #9ca3af; }
        .perm-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

        .select-all-row { padding: 8px 0; margin-bottom: 4px; border-bottom: 2px solid #e5e7eb; }
        .select-all-row label { font-weight: 600; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>EKOMAT Dashboard</h1>
        <div class="navbar-links">
            <a href="/">Dashboard</a>
            <a href="/orders">Orders</a>
            <a href="/admin/users" class="active">Users</a>
            <span style="color:#6b7280;font-size:12px;">{{ user.name }}</span>
            <a href="/logout">Wyloguj</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h2>Zarządzanie użytkownikami</h2>
            <button class="btn btn-add" onclick="openModal()">+ Dodaj użytkownika</button>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Użytkownik</th>
                        <th>Uprawnienia</th>
                        <th>Status</th>
                        <th>Ostatnie logowanie</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody id="users-table">
                    <tr><td colspan="5" style="text-align:center;color:#9ca3af;">Ładowanie...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add / Edit User Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <h3 id="modal-title">Dodaj użytkownika</h3>
            <input type="hidden" id="edit-id" value="">

            <label>Imię i nazwisko</label>
            <input type="text" id="f-name" placeholder="Jan Kowalski">

            <label>Email</label>
            <input type="email" id="f-email" placeholder="jan@ekomat.pl">

            <div class="perms-section">
                <div class="section-title">Uprawnienia</div>
                <div class="select-all-row perm-row">
                    <input type="checkbox" id="perm-select-all" onchange="toggleSelectAll(this)">
                    <label for="perm-select-all">Zaznacz wszystko</label>
                </div>
                <div id="perm-checkboxes">
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="dashboard" id="p-dashboard">
                        <label for="p-dashboard">Dashboard<br><span class="perm-desc">Widzi dashboard ze statystykami</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="orders" id="p-orders">
                        <label for="p-orders">Zamówienia<br><span class="perm-desc">Widzi tabelę zamówień</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="prices" id="p-prices">
                        <label for="p-prices">Ceny i przychody<br><span class="perm-desc">Widzi ceny, koszty dostawy, przychody</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="phones" id="p-phones">
                        <label for="p-phones">Telefony klientów<br><span class="perm-desc">Widzi numery telefonów</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="export" id="p-export">
                        <label for="p-export">Eksport XLSX<br><span class="perm-desc">Może eksportować zamówienia</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="sync" id="p-sync">
                        <label for="p-sync">Synchronizacja<br><span class="perm-desc">Może uruchamiać sync</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="add_orders" id="p-add_orders">
                        <label for="p-add_orders">Dodawanie zamówień<br><span class="perm-desc">Może dodawać zamówienia ręcznie</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="edit_comments" id="p-edit_comments">
                        <label for="p-edit_comments">Edycja komentarzy<br><span class="perm-desc">Może edytować komentarze w zamówieniach</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="mark_delivery" id="p-mark_delivery">
                        <label for="p-mark_delivery">Oznaczanie dostawy<br><span class="perm-desc">Może oznaczać zamówienia jako dostarczone</span></label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="perm-check" value="manage_users" id="p-manage_users">
                        <label for="p-manage_users">Zarządzanie użytkownikami<br><span class="perm-desc">Może dodawać/edytować/usuwać użytkowników</span></label>
                    </div>
                </div>
            </div>

            <div class="perms-section">
                <div class="section-title">Dostęp do źródeł</div>
                <div class="perm-row">
                    <input type="checkbox" id="src-all" value="all" onchange="toggleSrcAll(this)" checked>
                    <label for="src-all">Wszystkie sklepy</label>
                </div>
                <div id="src-checkboxes">
                    <div class="perm-row">
                        <input type="checkbox" class="src-check" value="dobraszklarnia" id="s-dobra">
                        <label for="s-dobra">dobraszklarnia.pl</label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="src-check" value="oteko" id="s-oteko">
                        <label for="s-oteko">oteko.pl</label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="src-check" value="cieplarnia" id="s-ciep">
                        <label for="s-ciep">cieplarnia.pl</label>
                    </div>
                    <div class="perm-row">
                        <input type="checkbox" class="src-check" value="allegro" id="s-allegro">
                        <label for="s-allegro">Allegro (wszystkie konta)</label>
                    </div>
                    <div style="margin-left:24px;">
                        <div class="perm-row">
                            <input type="checkbox" class="src-check" value="allegro:mantrade" id="s-al-mantrade">
                            <label for="s-al-mantrade">Allegro: mantrade</label>
                        </div>
                        <div class="perm-row">
                            <input type="checkbox" class="src-check" value="allegro:drogatrade" id="s-al-drogatrade">
                            <label for="s-al-drogatrade">Allegro: drogatrade</label>
                        </div>
                        <div class="perm-row">
                            <input type="checkbox" class="src-check" value="allegro:mega-agronom" id="s-al-mega">
                            <label for="s-al-mega">Allegro: mega-agronom</label>
                        </div>
                        <div class="perm-row">
                            <input type="checkbox" class="src-check" value="allegro:oteko_pl" id="s-al-oteko">
                            <label for="s-al-oteko">Allegro: oteko_pl</label>
                        </div>
                        <div class="perm-row">
                            <input type="checkbox" class="src-check" value="allegro:dobraszklarniapl" id="s-al-dobra">
                            <label for="s-al-dobra">Allegro: dobraszklarniapl</label>
                        </div>
                        <div class="perm-row">
                            <input type="checkbox" class="src-check" value="allegro:cieplarnia_pl" id="s-al-ciep">
                            <label for="s-al-ciep">Allegro: cieplarnia_pl</label>
                        </div>
                    </div>
                </div>
            </div>

            <label>Hasło</label>
            <input type="text" id="f-password" placeholder="min. 4 znaki">
            <div id="pw-hint" style="font-size:11px;color:#9ca3af;margin-top:-10px;margin-bottom:14px;display:none;">
                Pozostaw puste, aby nie zmieniać hasła
            </div>

            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Anuluj</button>
                <button class="btn btn-save" onclick="saveUser()">Zapisz</button>
            </div>
        </div>
    </div>

    <script>
    var permLabels = {
        dashboard:'Dashboard', orders:'Zamówienia', prices:'Ceny', phones:'Telefony',
        export:'Eksport', sync:'Sync', add_orders:'Dodawanie', edit_comments:'Komentarze',
        mark_delivery:'Dostawa', manage_users:'Użytkownicy'
    };

    function loadUsers() {
        fetch('/api/users').then(function(r){return r.json()}).then(function(d){
            var tb = document.getElementById('users-table');
            if (!d.users || d.users.length === 0) {
                tb.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9ca3af;">Brak użytkowników</td></tr>';
                return;
            }
            var html = '';
            d.users.forEach(function(u){
                var lastLogin = u.last_login ? new Date(u.last_login).toLocaleString('pl-PL') : '—';
                var statusClass = u.is_active ? 'status-active' : 'status-inactive';
                var statusText = u.is_active ? 'Aktywny' : 'Nieaktywny';

                // Permission tags
                var perms = (u.permissions || '').split(',').filter(function(p){return p.trim();});
                var permHtml = '';
                perms.forEach(function(p) {
                    permHtml += '<span class="perm-tag">' + (permLabels[p.trim()] || p.trim()) + '</span>';
                });
                if (!permHtml) permHtml = '<span style="color:#9ca3af;font-size:11px;">Brak</span>';

                html += '<tr>'
                    + '<td><strong>' + u.name + '</strong><br><span class="user-email">' + u.email + '</span></td>'
                    + '<td style="max-width:280px;">' + permHtml + '</td>'
                    + '<td class="' + statusClass + '">' + statusText + '</td>'
                    + '<td style="font-size:12px;">' + lastLogin + '</td>'
                    + '<td class="actions">'
                    + '<button class="btn-edit" onclick=\'editUser(' + JSON.stringify({id:u.id,name:u.name,email:u.email,permissions:u.permissions||"",allowed_sources:u.allowed_sources||"all",is_active:u.is_active}) + ')\'>Edytuj</button>'
                    + ' <button class="btn-toggle" onclick="toggleActive(' + u.id + ',' + u.is_active + ')">' + (u.is_active ? 'Wyłącz' : 'Włącz') + '</button>'
                    + ' <button class="btn-delete" onclick="deleteUser(' + u.id + ',\'' + u.name.replace(/'/g,"\\'") + '\')">Usuń</button>'
                    + '</td>'
                    + '</tr>';
            });
            tb.innerHTML = html;
        });
    }

    function setPerms(permsStr) {
        var perms = (permsStr || '').split(',').map(function(p){return p.trim();});
        document.querySelectorAll('.perm-check').forEach(function(cb) {
            cb.checked = perms.indexOf(cb.value) >= 0;
        });
        updateSelectAll();
    }
    function getPerms() {
        var selected = [];
        document.querySelectorAll('.perm-check:checked').forEach(function(cb) {
            selected.push(cb.value);
        });
        return selected.join(',');
    }
    function toggleSelectAll(master) {
        document.querySelectorAll('.perm-check').forEach(function(cb) { cb.checked = master.checked; });
    }
    function updateSelectAll() {
        var all = document.querySelectorAll('.perm-check');
        var checked = document.querySelectorAll('.perm-check:checked');
        document.getElementById('perm-select-all').checked = all.length === checked.length;
    }
    document.querySelectorAll('.perm-check').forEach(function(cb) {
        cb.addEventListener('change', updateSelectAll);
    });

    // --- Source access ---
    function toggleSrcAll(cb) {
        var srcChecks = document.querySelectorAll('.src-check');
        if (cb.checked) {
            srcChecks.forEach(function(s) { s.checked = false; s.disabled = true; });
        } else {
            srcChecks.forEach(function(s) { s.disabled = false; });
        }
    }
    function setSources(srcStr) {
        var srcAll = document.getElementById('src-all');
        var srcChecks = document.querySelectorAll('.src-check');
        if (!srcStr || srcStr === 'all') {
            srcAll.checked = true;
            srcChecks.forEach(function(s) { s.checked = false; s.disabled = true; });
        } else {
            srcAll.checked = false;
            var selected = srcStr.split(',').map(function(s){return s.trim();});
            srcChecks.forEach(function(s) {
                s.disabled = false;
                s.checked = selected.indexOf(s.value) >= 0;
            });
        }
    }
    function getSources() {
        if (document.getElementById('src-all').checked) return 'all';
        var selected = [];
        document.querySelectorAll('.src-check:checked').forEach(function(cb) { selected.push(cb.value); });
        return selected.join(',') || 'all';
    }

    function openModal() {
        document.getElementById('edit-id').value = '';
        document.getElementById('modal-title').textContent = 'Dodaj użytkownika';
        document.getElementById('f-name').value = '';
        document.getElementById('f-email').value = '';
        document.getElementById('f-email').disabled = false;
        document.getElementById('f-password').value = '';
        document.getElementById('f-password').placeholder = 'min. 4 znaki';
        document.getElementById('pw-hint').style.display = 'none';
        setPerms('dashboard,orders');
        setSources('all');
        document.getElementById('user-modal').classList.add('open');
    }

    function editUser(u) {
        document.getElementById('edit-id').value = u.id;
        document.getElementById('modal-title').textContent = 'Edytuj użytkownika';
        document.getElementById('f-name').value = u.name;
        document.getElementById('f-email').value = u.email;
        document.getElementById('f-email').disabled = true;
        document.getElementById('f-password').value = '';
        document.getElementById('f-password').placeholder = 'nowe hasło (opcjonalnie)';
        document.getElementById('pw-hint').style.display = 'block';
        setPerms(u.permissions);
        setSources(u.allowed_sources || 'all');
        document.getElementById('user-modal').classList.add('open');
    }

    function closeModal() {
        document.getElementById('user-modal').classList.remove('open');
    }

    function saveUser() {
        var editId = document.getElementById('edit-id').value;
        var data = {
            name: document.getElementById('f-name').value.trim(),
            email: document.getElementById('f-email').value.trim(),
            password: document.getElementById('f-password').value,
            permissions: getPerms(),
            allowed_sources: getSources()
        };
        if (!data.name || !data.email) { alert('Wypełnij imię i email'); return; }

        if (editId) {
            fetch('/api/users/' + editId, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(function(r){
                if (!r.ok) return r.json().then(function(d){ alert(d.detail || 'Błąd'); throw 'err'; });
                closeModal(); loadUsers();
            }).catch(function(){});
        } else {
            if (!data.password || data.password.length < 4) { alert('Hasło musi mieć min. 4 znaki'); return; }
            fetch('/api/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            }).then(function(r){
                if (!r.ok) return r.json().then(function(d){ alert(d.detail || 'Błąd'); throw 'err'; });
                closeModal(); loadUsers();
            }).catch(function(){});
        }
    }

    function toggleActive(id, currentlyActive) {
        var msg = currentlyActive ? 'Dezaktywować tego użytkownika?' : 'Aktywować tego użytkownika?';
        if (!confirm(msg)) return;
        fetch('/api/users/' + id, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({is_active: !currentlyActive})
        }).then(function(){ loadUsers(); });
    }

    function deleteUser(id, name) {
        if (!confirm('Na pewno usunąć użytkownika "' + name + '"?')) return;
        fetch('/api/users/' + id, { method: 'DELETE' }).then(function(){ loadUsers(); });
    }

    loadUsers();
    </script>
</body>
</html>
